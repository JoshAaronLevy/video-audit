<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Video Audit Bridge</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="panel">
      <header class="panel-header">
        <p class="eyebrow">Video Audit</p>
        <h1>Premiere Bridge</h1>
      </header>

      <section class="status-card" aria-live="polite">
        <div class="status-row">
          <span class="status-label">Bridge</span>
          <span id="bridgeStatus" class="status-value">Not connected</span>
        </div>
        <div class="status-row">
          <span class="status-label">Output</span>
          <span id="outputStatus" class="status-value">Not connected</span>
        </div>
        <div class="status-row">
          <span class="status-label">Project</span>
          <span id="projectStatus" class="status-value">Checking...</span>
        </div>
        <div class="status-row">
          <span class="status-label">Heartbeat</span>
          <span id="heartbeatStatus" class="status-value">Not written</span>
        </div>
      </section>

      <section class="actions">
        <button id="selectBridgeFolder" type="button">Select bridge folder</button>
        <button id="selectOutputFolder" type="button">Select output folder</button>
        <button id="processNow" type="button">Process now</button>
      </section>

      <section class="activity-card">
        <h2>Last activity</h2>
        <p id="lastActivity">Waiting for bridge folders.</p>
      </section>
    </main>

    <script src="index.js"></script>
  </body>
</html>
